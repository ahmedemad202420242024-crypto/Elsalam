        if (distance > 4000) {
            total = (4000 * base) + ((distance - 4000) * extra);
        } else {
            total = distance * base;
        }
        document.getElementById('liveTotal').innerText = total.toLocaleString();
    }

    document.getElementById('tripForm').addEventListener('submit', function(e){
        e.preventDefault();
        database.ref('trips/').push({
            tripDate: document.getElementById('tripDate').value,
            username: document.getElementById('username').value,
            carNumber: document.getElementById('carNumber').value,
            carType: document.getElementById('carType').value,
            projectManager: document.getElementById('projectManager').value,
            department: document.getElementById('department').value,
            section: document.getElementById('sectionField').value,
            location: document.getElementById('mainLocation').value,
            distance: (parseFloat(document.getElementById('endCounter').value) - parseFloat(document.getElementById('startCounter').value)),
            totalCost: document.getElementById('liveTotal').innerText
        });
        alert('تم الحفظ بنجاح!');
        this.reset();
    });

    window.onload = () => { populateSelects(); handleCarChange(); };
</script>
</body>
</html>
