        select.innerHTML += `<option value="${carNum}">${carNum} (${carInfo.type})</option>`;
    });

    // ميزة ذكية: عند اختيار المركبة يتم ملء الحقول تلقائياً بأسعارها الافتراضية
    select.addEventListener('change', function() {
        const selectedCar = this.value;
        if(carDatabase[selectedCar]) {
            document.getElementById('basePrice').value = carDatabase[selectedCar].base;
            document.getElementById('extraPrice').value = carDatabase[selectedCar].extra;
            
            // تعيين تاريخ اليوم كخيار افتراضي لتسهيل الإدخال
            const today = new Date().toISOString().split('T')[0];

        }

    document.getElementById('pricingForm').addEventListener('submit', function(e){

        database.ref('pricing/').push({
            carNumber: document.getElementById('priceCarNum').value,
            basePrice: parseFloat(document.getElementById('basePrice').value),
            extraPrice: parseFloat(document.getElementById('extraPrice').value),
            startDate: document.getElementById('pricingStartDate').value
        });

    });
