<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>شاشة التسعير - نظام السلام</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { --primary-color: #1B365D; --bg-color: #f0f4f8; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); margin: 0; padding: 0; display: flex; direction: rtl; }
        .sidebar { width: 260px; background-color: var(--primary-color); color: white; min-height: 100vh; position: fixed; right: 0; top: 0; padding-top: 20px; }
        .sidebar-menu { list-style: none; padding: 0; margin: 20px 0; }
        .sidebar-menu li a { display: flex; align-items: center; padding: 15px 20px; color: #ecf0f1; text-decoration: none; font-size: 15px; }
        .sidebar-menu li a i { margin-left: 10px; font-size: 18px; width: 25px; }
        .sidebar-menu li.active a { background-color: rgba(255,255,255,0.1); border-right: 4px solid #f39c12; }
        .main-content { margin-right: 260px; padding: 30px; width: 100%; box-sizing: border-box; }
        .container { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 25px; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 15px; }
        .form-group { display: flex; flex-direction: column; text-align: right; }
        label { margin-bottom: 5px; font-weight: bold; color: #333; }
        input, select { padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        .btn { background: var(--primary-color); color: white; padding: 12px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; font-size: 15px; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: center; }
        th { background-color: var(--primary-color); color: white; }
    </style>
</head>
<body>
    <div class="sidebar">
        <ul class="sidebar-menu">
            <li><a href="dashboard.html"><i class="fa-solid fa-chart-line"></i> لوحة التحكم</a></li>
            <li><a href="database.html"><i class="fa-solid fa-database"></i> قاعدة البيانات</a></li>
            <li class="active"><a href="pricing.html"><i class="fa-solid fa-tags"></i> شاشة التسعير</a></li>
            <li><a href="trips.html"><i class="fa-solid fa-route"></i> المشاوير</a></li>
            <li><a href="queries.html"><i class="fa-solid fa-magnifying-glass"></i> بند الاستعلامات</a></li>
            <li><a href="invoice.html"><i class="fa-solid fa-file-invoice-dollar"></i> الفواتير</a></li>
            <li><a href="login.html" style="color: #e74c3c;"><i class="fa-solid fa-right-from-bracket"></i> خروج</a></li>
        </ul>
    </div>

    <div class="main-content">
        <div class="container">
            <h3>إعداد لوحة تسعير وتحديث المركبات الدوري</h3>
            <form id="pricingForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label>رقم المركبة:</label>
                        <select id="priceCarNum" required></select>
                    </div>
                    <div class="form-group">
                        <label>سعر كم الأساسي:</label>
                        <input type="number" step="0.01" id="basePrice" required>
                    </div>
                    <div class="form-group">
                        <label>سعر كم الزيادة:</label>
                        <input type="number" step="0.01" id="extraPrice" required>
                    </div>
                    <div class="form-group">
                        <label>تاريخ بدء سريان التسعير الجديد:</label>
                        <input type="date" id="pricingStartDate" required>
                    </div>
                </div>
                <button type="submit" class="btn">حفظ وتحديث خطة الأسعار بالسيرفر 💾</button>
            </form>
        </div>

        <h3>📋 جدول تسعير المركبات الفعال أونلاين</h3>
        <table>
            <thead>
                <tr>
                    <th>رقم المركبة</th>
                    <th>السعر الأساسي</th>
                    <th>سعر الزيادة</th>
                    <th>تاريخ سريان العمل به</th>
                </tr>
            </thead>
            <tbody id="pricingTableBody"></tbody>
        </table>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAf-xssfq1KrNKwLE5Nr88P6dIvs5Byz7c",
        authDomain: "elsalam-system-2e469.firebaseapp.com",
        databaseURL: "https://elsalam-system-2e469-default-rtdb.firebaseio.com",
        projectId: "elsalam-system-2e469",
        storageBucket: "elsalam-system-2e469.firebasestorage.app",
        messagingSenderId: "422861890504",
        appId: "1:422861890504:web:bad369e188f323bf7d56fd"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // جلب قائمة العربيات من قاعدة البيانات لإدراجها في السيلكت
    database.ref('custom_db/cars').on('value', snap => {
        const select = document.getElementById('priceCarNum'); select.innerHTML = '';
        snap.forEach(c => { select.innerHTML += `<option value="${c.val().num}">${c.val().num}</option>`; });
    });

    document.getElementById('pricingForm').addEventListener('submit', function(e){
        e.preventDefault();
        database.ref('pricing/').push({
            carNumber: document.getElementById('priceCarNum').value,
            basePrice: parseFloat(document.getElementById('basePrice').value),
            extraPrice: parseFloat(document.getElementById('extraPrice').value),
            startDate: document.getElementById('pricingStartDate').value
        });
        document.getElementById('pricingForm').reset();
        alert('تم حفظ التسعير الجديد بنجاح!');
    });

    database.ref('pricing/').on('value', function(snapshot){
        const tbody = document.getElementById('pricingTableBody'); tbody.innerHTML = '';
        snapshot.forEach(function(child){
            tbody.innerHTML += `<tr><td>${child.val().carNumber}</td><td>${child.val().basePrice} جنيه</td><td>${child.val().extraPrice} جنيه</td><td>${child.val().startDate}</td></tr>`;
        });
    });
</script>
</body>
</html>
