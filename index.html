<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل الدخول - نظام السلام</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f4f8; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); width: 100%; max-width: 400px; text-align: center; }
        .login-card h2 { color: #1B365D; margin-bottom: 25px; }
        .form-group { display: flex; flex-direction: column; text-align: right; margin-bottom: 15px; }
        label { font-weight: bold; margin-bottom: 5px; color: #333; }
        input { padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 15px; }
        .btn { background: #1B365D; color: white; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; font-size: 16px; margin-top: 15px; transition: background 0.3s; }
        .btn:hover { background: #11223b; }
        .error-msg { color: #e74c3c; margin-top: 10px; font-size: 14px; display: none; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>نظام إدارة الحركة والنقل</h2>
        <p style="color:#7f8c8d; font-size:14px; margin-top:-15px;">شركة السلام للمقاولات والتوريدات العمومية</p>
        <form id="loginForm">
            <div class="form-group">
                <label>البريد الإلكتروني:</label>
                <input type="email" id="email" required placeholder="example@gmail.com">
            </div>
            <div class="form-group">
                <label>كلمة المرور:</label>
                <input type="password" id="password" required placeholder="********">
            </div>
            <button type="submit" class="btn">تسجيل الدخول</button>
            <div class="error-msg" id="errorMsg"></div>
        </form>
    </div>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAf-xssfq1KrNKwLE5Nr88P6dIvs5Byz7c",
        authDomain: "elsalam-system-2e469.firebaseapp.com",
        databaseURL: "https://elsalam-system-2e469-default-rtdb.firebaseio.com",
        projectId: "elsalam-system-2e469",
        storageBucket: "elsalam-system-2e469.firebasestorage.app",
        messagingSenderId: "422861890504",
        appId: "1:422861890504:web:bad369e188f323bf7d56fd"
    };
    firebase.initializeApp(firebaseConfig);
    
    document.getElementById('loginForm').addEventListener('submit', function(e){
        e.preventDefault();
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        const errorDiv = document.getElementById('errorMsg');
        
        firebase.auth().signInWithEmailAndPassword(email, pass)
        .then((userCredential) => {
            localStorage.setItem('username', email);
            window.location.href = 'dashboard.html';
        })
        .catch((error) => {
            errorDiv.style.display = 'block';
            errorDiv.innerText = "خطأ: بيانات الدخول غير صحيحة.";
        });
    });
</script>
</body>
</html>
